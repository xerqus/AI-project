name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Clean Mock Root Gradle Files
        run: rm -f build.gradle.kts settings.gradle.kts

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Web Application
        run: npm run build

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Capacitor CLI & Platforms
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap --version

      - name: Add Android & Sync Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android directory already exists, skipping 'cap add'"
          fi
          npx cap sync android

      - name: Ensure gradlew has Executable Permissions
        run: |
          cd android
          chmod +x gradlew

      - name: Build Android APK via Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Option-Plus-Invoice-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
